<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis Factory | Universal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
        :root { --neon-green: #39FF14; --bg-dark: #010B13; }
        body { margin: 0; background-color: var(--bg-dark); color: #ffffff; font-family: 'IBM Plex Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        .font-mono { font-family: 'Inconsolata', monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: rgba(57, 255, 20, 0.1); }
        main::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 100; opacity: 0.12; }
        .dashboard-card { transition: border-color 0.3s ease, box-shadow 0.3s ease; }
        .dashboard-card:hover { border-color: rgba(57, 255, 20, 0.4); box-shadow: 0 0 25px rgba(57, 255, 20, 0.08); }
    </style>
</head>
<body class="overflow-hidden">
    <div class="flex h-screen w-full bg-[#010B13]">
        <aside class="w-20 bg-[#111111] border-r border-[#39FF14]/20 flex flex-col items-center py-8 z-50">
            <div class="mb-12 group cursor-pointer"><i class="ti ti-cpu text-[#39FF14] text-3xl drop-shadow-[0_0_8px_rgba(57,255,20,0.6)]"></i></div>
            <nav class="flex-1 flex flex-col gap-6">
                <a href="../../Chronicle/dashboard/index.html" class="group relative p-3 text-white/40 hover:text-[#39FF14] transition-colors flex items-center justify-center" title="Chronicle"><i class="ti ti-brain text-2xl group-hover:drop-shadow-[0_0_8px_#39FF14]"></i></a>
                <a href="../../Oracle/dashboard/index.html" class="group relative p-3 text-white/40 hover:text-[#39FF14] transition-colors flex items-center justify-center" title="Oracle"><i class="ti ti-trending-up text-2xl group-hover:drop-shadow-[0_0_8px_#39FF14]"></i></a>
                <a href="../../Nexus/dashboard/index.html" class="group relative p-3 text-white/40 hover:text-[#39FF14] transition-colors flex items-center justify-center" title="Nexus"><i class="ti ti-share-2 text-2xl group-hover:drop-shadow-[0_0_8px_#39FF14]"></i></a>
                <a href="../../Pulse/dashboard/index.html" class="group relative p-3 text-white/40 hover:text-[#39FF14] transition-colors flex items-center justify-center" title="Pulse"><i class="ti ti-activity text-2xl group-hover:drop-shadow-[0_0_8px_#39FF14]"></i></a>
                <a href="../../Atlas/dashboard/index.html" class="group relative p-3 text-white/40 hover:text-[#39FF14] transition-colors flex items-center justify-center" title="Atlas"><i class="ti ti-search text-2xl group-hover:drop-shadow-[0_0_8px_#39FF14]"></i></a>
                <a href="../../Forge/dashboard/index.html" class="group relative p-3 text-white/40 hover:text-[#39FF14] transition-colors flex items-center justify-center" title="Forge"><i class="ti ti-hammer text-2xl group-hover:drop-shadow-[0_0_8px_#39FF14]"></i></a>
                <a href="index.html" class="group relative p-3 text-[#39FF14] flex items-center justify-center" title="Genesis">
                    <div class="absolute inset-y-2 left-0 w-[2px] bg-[#39FF14] shadow-[0_0_15px_#39FF14]"></div>
                    <i class="ti ti-zap text-2xl drop-shadow-[0_0_8px_#39FF14]"></i>
                </a>
                <a href="../../Aegis/dashboard/index.html" class="group relative p-3 text-white/40 hover:text-[#39FF14] transition-colors flex items-center justify-center" title="Aegis"><i class="ti ti-shield text-2xl group-hover:drop-shadow-[0_0_8px_#39FF14]"></i></a>
                <a href="../../Sentinel/dashboard/index.html" class="group relative p-3 text-white/40 hover:text-[#39FF14] transition-colors flex items-center justify-center" title="Sentinel"><i class="ti ti-news text-2xl group-hover:drop-shadow-[0_0_8px_#39FF14]"></i></a>
            </nav>
            <div class="mt-auto pt-8 flex flex-col gap-6">
                <button class="text-white/40 hover:text-[#39FF14] transition-colors"><i class="ti ti-settings text-2xl"></i></button>
                <div class="w-10 h-10 rounded bg-[#39FF14]/10 border border-[#39FF14]/20 flex items-center justify-center text-[#39FF14] font-mono text-xs font-bold">U.AI</div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8 space-y-8 relative">
            <header class="flex items-center justify-between border-b border-[#39FF14]/10 pb-8">
                <div class="flex items-baseline gap-6">
                    <div class="space-y-1">
                        <h1 class="font-mono text-3xl font-bold text-[#39FF14] tracking-tighter uppercase leading-none">Genesis Factory</h1>
                        <div class="flex items-center gap-3">
                            <span class="w-2 h-2 bg-[#39FF14] rounded-full animate-pulse"></span>
                            <p class="text-white/40 text-[10px] font-mono uppercase tracking-[0.2em]">Agent Factory, Design & Deployment</p>
                        </div>
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-12 gap-8 h-[480px]">
                <div class="col-span-8 bg-[#111111] border border-[#39FF14]/20 rounded-sm p-6 dashboard-card">
                    <h3 class="font-mono text-xs text-[#39FF14] font-bold uppercase tracking-widest mb-6">Agent Design & Certification</h3>
                    <div class="grid grid-cols-2 gap-8">
                        <div class="bg-[#010B13] p-6 border border-white/5 space-y-4">
                            <p class="text-[10px] text-[#39FF14] font-mono font-bold uppercase">PROTOTYPE: AGENT_OMEGA</p>
                            <div class="space-y-2">
                                <p class="text-[9px] text-white/30 font-mono uppercase">Capability Analysis</p>
                                <div class="w-full bg-[#39FF14]/5 h-1.5 rounded-full"><div class="bg-[#39FF14] h-full w-[85%]"></div></div>
                            </div>
                            <p class="text-[9px] text-white/40 font-mono">Status: DESIGNING_LOGIC</p>
                        </div>
                        <div class="bg-[#010B13] p-6 border border-white/5 space-y-4">
                            <p class="text-[10px] text-[#39FF14] font-mono font-bold uppercase">PROTOTYPE: AGENT_SIGMA</p>
                            <div class="space-y-2">
                                <p class="text-[9px] text-white/30 font-mono uppercase">Certification Progress</p>
                                <div class="w-full bg-[#39FF14]/5 h-1.5 rounded-full"><div class="bg-blue-500 h-full w-[40%]"></div></div>
                            </div>
                            <p class="text-[9px] text-white/40 font-mono">Status: AEGIS_AUDIT_PENDING</p>
                        </div>
                    </div>
                </div>

                <div class="col-span-4 bg-[#111111] border border-[#39FF14]/20 rounded-sm p-6 dashboard-card">
                    <h3 class="font-mono text-xs text-[#39FF14] font-bold uppercase tracking-widest mb-6">Deployment Logs</h3>
                    <div id="gen-logs" class="space-y-3 font-mono text-[9px]">
                        <!-- Dynamic logs -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        const logContainer = document.getElementById('gen-logs');
        function addLog() {
            const time = new Date().toLocaleTimeString([], { hour12: false });
            const logEl = document.createElement('div');
            logEl.className = 'opacity-0 translate-x-1 transition-all duration-300 text-white/60';
            logEl.innerHTML = `<span class="text-[#39FF14] mr-2">[${time}]</span> INSTANCE_ALPHA deployed to CLUSTER_01`;
            logContainer.prepend(logEl);
            setTimeout(() => logEl.classList.remove('opacity-0', 'translate-x-1'), 50);
            if (logContainer.children.length > 10) logContainer.lastElementChild.remove();
        }
        setInterval(addLog, 5000);
        addLog();
    </script>
</body>
</html>
