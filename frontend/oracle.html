<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oracle — Universe</title>
  <link rel="stylesheet" href="shared/shared.css"/>
  <link rel="stylesheet" href="shared/components.css"/>
  <script src="shared/theme.js"></script>
</head>
<body data-agent="oracle">
  <canvas id="cosmos-canvas"></canvas>
  <div class="app-shell">
    <aside id="sidebar" data-active-agent="oracle"></aside>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-agent-icon icon-md"><span data-icon="agent:oracle"></span></div>
        <div>
          <div class="topbar-title">Oracle</div>
          <div class="topbar-subtitle">The All-Seeing Eye of Markets</div>
        </div>
        <div class="topbar-spacer"></div>
        <div class="topbar-actions">
          <div id="connBadge" class="conn-badge"><span class="conn-dot"></span><span id="connText">Connecting…</span></div>
          <button class="icon-btn theme-toggle-btn" title="Toggle theme"><span data-icon="ui:theme" class="icon-md"></span></button>
        </div>
      </header>
      <main class="dashboard-content">
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-label">PnL Today</div>
            <div class="kpi-value" id="kpi_pnl_today">—</div>
            <div class="kpi-delta pos" id="kpid_pnl_today"></div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Win Rate</div>
            <div class="kpi-value" id="kpi_win_rate">—</div>
            <div class="kpi-delta neu" id="kpid_win_rate"></div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Open Trades</div>
            <div class="kpi-value" id="kpi_open_trades">—</div>
            <div class="kpi-delta neu" id="kpid_open_trades"></div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Signals</div>
            <div class="kpi-value" id="kpi_signals_today">—</div>
            <div class="kpi-delta neu" id="kpid_signals_today"></div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Portfolio</div>
            <div class="kpi-value" id="kpi_portfolio_value">—</div>
            <div class="kpi-delta neu" id="kpid_portfolio_value"></div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Drawdown</div>
            <div class="kpi-value" id="kpi_max_drawdown">—</div>
            <div class="kpi-delta neg" id="kpid_max_drawdown"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">Live Feed</span>
            <button class="btn btn-ghost btn-sm" onclick="loadDashboard()"><span data-icon="ui:refresh" class="icon-sm"></span></button>
          </div>
          <div class="card-body">
            <div id="section_primary" class="feed-list">
              <div class="skeleton skeleton-card"></div>
              <div class="skeleton skeleton-card" style="margin-top:8px"></div>
              <div class="skeleton skeleton-card" style="margin-top:8px"></div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">Secondary Data</span>
            <button class="btn btn-ghost btn-sm" onclick="loadDashboard()"><span data-icon="ui:refresh" class="icon-sm"></span></button>
          </div>
          <div class="card-body">
            <div id="section_secondary" class="feed-list">
              <div class="skeleton skeleton-card"></div>
              <div class="skeleton skeleton-card" style="margin-top:8px"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <button class="chat-fab" id="chatFab" title="Ask Oracle">
    <span data-icon="ui:chat" class="icon-lg"></span>
  </button>
  <div class="chat-drawer-overlay" id="chatOverlay"></div>
  <div class="chat-drawer" id="chatDrawer">
    <div class="chat-drawer-header">
      <div class="chat-drawer-agent-icon icon-md"><span data-icon="agent:oracle"></span></div>
      <div>
        <div class="chat-drawer-title">Oracle</div>
        <div style="font-size:11px;color:var(--text-muted);font-style:italic">Trading Intelligence</div>
      </div>
      <button class="chat-drawer-close" id="chatClose"><span data-icon="ui:close" class="icon-sm"></span></button>
    </div>
    <div class="chat-drawer-messages" id="chatMessages">
      <div class="chat-msg agent">
        <div class="chat-bubble">Greetings. I am Oracle, the all-seeing eye of markets. How may I illuminate the path before you?</div>
      </div>
    </div>
    <div class="chat-drawer-input-area">
      <div class="chat-hints">
        <button class="chat-hint-chip">What is your current status?</button>
        <button class="chat-hint-chip">Show me the latest data</button>
        <button class="chat-hint-chip">Explain your top signal</button>
      </div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" rows="1" placeholder="Ask Oracle…"></textarea>
        <button class="chat-send-btn" id="chatSend" disabled><span data-icon="ui:send" class="icon-md"></span></button>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>

  <script src="shared/icons.js"></script>
  <script src="shared/config.js"></script>
  <script src="shared/api.js"></script>
  <script src="shared/notifications.js"></script>
  <script src="shared/cosmos.js"></script>
  <script src="shared/sidebar.js"></script>
  <script>
  const AGENT_ID = 'oracle';
  const API_BASE = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE) || 'http://localhost:8000';

  async function checkConn() {
    const badge = document.getElementById('connBadge');
    const text  = document.getElementById('connText');
    try {
      const r = await fetch(API_BASE + '/health', { signal: AbortSignal.timeout(8000) });
      if (r.ok) { badge.className='conn-badge online'; text.textContent='Live'; return true; }
    } catch(e) {}
    badge.className='conn-badge offline'; text.textContent='Offline'; return false;
  }

  function setKpi(key, val, delta) {
    const el = document.getElementById('kpi_' + key);
    const de = document.getElementById('kpid_' + key);
    if (el) el.textContent = val != null ? val : '—';
    if (de && delta) { de.textContent = delta; de.className = 'kpi-delta ' + (delta.startsWith('+') ? 'pos' : delta.startsWith('-') ? 'neg' : 'neu'); }
  }

  function offlinePanel(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '<div class="offline-panel"><div class="offline-icon icon-xl"><span data-icon="ui:connected" class="icon-xl"></span></div><div class="offline-title">Awaiting Connection</div><div class="offline-msg">Reconnecting to live data.</div></div>';
    if (typeof injectIcons === 'function') injectIcons();
  }

  function renderFeedItem(item) {
    return '<div class="feed-item"><div class="feed-dot"></div><div class="feed-body"><div class="feed-title">' + (item.title||item.name||item.text||item.headline||JSON.stringify(item)) + '</div><div class="feed-meta"><span>' + (item.source||item.agent||'') + '</span><span>' + (item.time||item.timestamp||'') + '</span></div></div></div>';
  }

  async function loadDashboard() {
    try {
      const r = await fetch(API_BASE + '/agents/' + AGENT_ID + '/data', { signal: AbortSignal.timeout(8000) });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      // KPIs
            setKpi('pnl_today', d['pnl_today'] != null ? d['pnl_today'] : (d.metrics && d.metrics['pnl_today'] != null ? d.metrics['pnl_today'] : null), d.deltas && d.deltas['pnl_today']);
      setKpi('win_rate', d['win_rate'] != null ? d['win_rate'] : (d.metrics && d.metrics['win_rate'] != null ? d.metrics['win_rate'] : null), d.deltas && d.deltas['win_rate']);
      setKpi('open_trades', d['open_trades'] != null ? d['open_trades'] : (d.metrics && d.metrics['open_trades'] != null ? d.metrics['open_trades'] : null), d.deltas && d.deltas['open_trades']);
      setKpi('signals_today', d['signals_today'] != null ? d['signals_today'] : (d.metrics && d.metrics['signals_today'] != null ? d.metrics['signals_today'] : null), d.deltas && d.deltas['signals_today']);
      setKpi('portfolio_value', d['portfolio_value'] != null ? d['portfolio_value'] : (d.metrics && d.metrics['portfolio_value'] != null ? d.metrics['portfolio_value'] : null), d.deltas && d.deltas['portfolio_value']);
      setKpi('max_drawdown', d['max_drawdown'] != null ? d['max_drawdown'] : (d.metrics && d.metrics['max_drawdown'] != null ? d.metrics['max_drawdown'] : null), d.deltas && d.deltas['max_drawdown']);
      // Primary section: first array found in data
      const keys = Object.keys(d).filter(k => Array.isArray(d[k]) && d[k].length > 0);
      if (keys.length > 0) {
        const el = document.getElementById('section_primary');
        if (el) { el.innerHTML = d[keys[0]].slice(0,8).map(renderFeedItem).join(''); }
      } else { offlinePanel('section_primary'); }
      if (keys.length > 1) {
        const el2 = document.getElementById('section_secondary');
        if (el2) { el2.innerHTML = d[keys[1]].slice(0,6).map(renderFeedItem).join(''); }
      } else { offlinePanel('section_secondary'); }
      if (typeof injectIcons === 'function') injectIcons();
    } catch(e) {
      offlinePanel('section_primary');
      offlinePanel('section_secondary');
    }
  }

  // Chat
  const fab=document.getElementById('chatFab'), drawer=document.getElementById('chatDrawer'),
        overlay=document.getElementById('chatOverlay'), closeBtn=document.getElementById('chatClose'),
        chatIn=document.getElementById('chatInput'), chatSnd=document.getElementById('chatSend'),
        chatMsg=document.getElementById('chatMessages');

  fab.addEventListener('click', () => { drawer.classList.add('open'); overlay.classList.add('visible'); });
  closeBtn.addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('visible'); });
  overlay.addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('visible'); });

  chatIn.addEventListener('input', () => {
    chatIn.style.height='auto'; chatIn.style.height=Math.min(chatIn.scrollHeight,120)+'px';
    chatSnd.disabled=!chatIn.value.trim();
  });
  chatIn.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); if(!chatSnd.disabled) chatSnd.click(); } });

  document.querySelectorAll('.chat-hint-chip').forEach(c => {
    c.addEventListener('click', () => { chatIn.value=c.textContent; chatIn.dispatchEvent(new Event('input')); chatSnd.click(); });
  });

  function addMsg(role, text) {
    const d=document.createElement('div'); d.className='chat-msg '+role;
    d.innerHTML='<div class="chat-bubble">'+text+'</div>';
    chatMsg.appendChild(d); chatMsg.scrollTop=chatMsg.scrollHeight; return d;
  }
  function addTyping() {
    const d=document.createElement('div'); d.className='chat-msg agent';
    d.innerHTML='<div class="chat-typing"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
    chatMsg.appendChild(d); chatMsg.scrollTop=chatMsg.scrollHeight; return d;
  }

  chatSnd.addEventListener('click', async () => {
    const text=chatIn.value.trim(); if(!text) return;
    chatIn.value=''; chatIn.style.height='auto'; chatSnd.disabled=true;
    addMsg('user', text);
    const t=addTyping();
    try {
      const r=await fetch(API_BASE+'/agents/'+AGENT_ID+'/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({message:text}), signal:AbortSignal.timeout(60000)
      });
      t.remove();
      const data=await r.json();
      addMsg('agent', data.response||data.message||'The oracle has spoken.');
    } catch(e) { t.remove(); addMsg('agent','The backend is still working or reconnecting. Please try again in a moment.'); }
  });

  checkConn();
  loadDashboard();
  setInterval(loadDashboard, 45000);
  setInterval(checkConn, 30000);
  </script>
</body>
</html>
