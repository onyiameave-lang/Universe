<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse — Social Sentiment</title>
<script src="shared/theme.js"></script>
<link rel="stylesheet" href="shared/shared.css">
<link rel="stylesheet" href="shared/components.css">
<style>:root { --accent:#EC4899; --accent-rgb:236,72,153; }</style>
</head>
<body>

<!-- TOPBAR -->
<nav class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">💓</span>
    <span class="topbar-brand">PULSE</span>
    <span class="topbar-divider"></span>
    <span class="topbar-page-name">Social Sentiment</span>
  </div>
  <div class="topbar-right">
    <span id="connBadge" class="api-badge api-loading">⏳ Connecting…</span>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️ Light</button>
    <a href="index.html" class="btn btn-ghost btn-sm">← Home</a>
  </div>
</nav>

<!-- CHAT LAYOUT -->
<div class="agent-chat-layout">

  <!-- SESSION SIDEBAR -->
  <aside class="chat-session-sidebar">
    <div class="chat-session-header">
      <div class="chat-session-agent-icon">💓</div>
      <div class="chat-session-agent-info">
        <div class="chat-session-agent-name">Pulse</div>
        <div class="chat-session-agent-role">Social Sentiment</div>
      </div>
    </div>
    <button class="chat-new-btn" id="chatNewBtn">＋ New Chat</button>
    <div class="chat-session-list-wrap">
      <ul class="chat-session-list" id="chatSessionList"></ul>
    </div>
    <div style="padding:12px 16px;border-top:1px solid var(--border)">
      <a href="index.html" style="font-size:12px;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:6px">
        ← Back to Hub
      </a>
    </div>
  </aside>

  <!-- MAIN CHAT AREA -->
  <div class="chat-main-area">
    <div class="chat-main-header">
      <div class="chat-main-agent-dot" style="background:#EC4899"></div>
      <span class="chat-main-agent-name">Pulse</span>
      <span class="chat-main-agent-role">Social Sentiment</span>
      <span class="chat-main-hint">POST /agents/pulse/chat</span>
    </div>

    <!-- Messages -->
    <div class="chat-messages-wrap" id="chatMessages"></div>

    <!-- Empty state -->
    <div class="chat-empty-state" id="chatEmptyState">
      <div class="chat-empty-icon">💓</div>
      <div class="chat-empty-title">Chat with Pulse</div>
      <div class="chat-empty-desc">e.g. 'query social sentiment on Bitcoin'</div>
      <div class="chat-hint-chips">
        <span class="chat-hint-chip" onclick="window._chat&&window._chat._fillInput('query Bitcoin sentiment')">query Bitcoin sentiment</span>
        <span class="chat-hint-chip" onclick="window._chat&&window._chat._fillInput('query trending topics')">query trending topics</span>
        <span class="chat-hint-chip" onclick="window._chat&&window._chat._fillInput('query social feed')">query social feed</span>
        <span class="chat-hint-chip" onclick="window._chat&&window._chat._fillInput('query viral alerts')">query viral alerts</span>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-wrap">
      <div class="chat-input-row">
        <textarea class="chat-input-v5" id="chatInput" placeholder="e.g. 'query social sentiment on Bitcoin'" rows="1"></textarea>
        <button class="chat-send-v5" id="chatSend">➤</button>
      </div>
    </div>
  </div>

</div>

<div id="toast-container"></div>

<script src="shared/config.js"></script>
<script src="shared/api.js"></script>
<script src="shared/chat.js"></script>
<script src="shared/notifications.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const chat = new AgentChat('pulse', {
    messagesId: 'chatMessages',
    inputId:    'chatInput',
    sendId:     'chatSend',
    newBtnId:   'chatNewBtn',
    listId:     'chatSessionList',
    emptyId:    'chatEmptyState',
  });
  // Helper for hint chips
  chat._fillInput = function(text) {
    const inp = document.getElementById(this.inputId);
    if (inp) { inp.value = text; inp.focus(); }
  };
  window._chat = chat;
  startConnectionPolling(30_000);
});
</script>
</body>
</html>
