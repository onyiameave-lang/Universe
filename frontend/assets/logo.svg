<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10A37F" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.4"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10A37F"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.8"/>
  <!-- Inner glow -->
  <circle cx="24" cy="24" r="16" fill="url(#glow)" opacity="0.3"/>
  <!-- Center star/nexus -->
  <circle cx="24" cy="24" r="4" fill="#10A37F"/>
  <!-- Spokes -->
  <line x1="24" y1="8"  x2="24" y2="16" stroke="#10A37F" stroke-width="1.5" opacity="0.7"/>
  <line x1="24" y1="32" x2="24" y2="40" stroke="#10A37F" stroke-width="1.5" opacity="0.7"/>
  <line x1="8"  y1="24" x2="16" y2="24" stroke="#6366F1" stroke-width="1.5" opacity="0.7"/>
  <line x1="32" y1="24" x2="40" y2="24" stroke="#6366F1" stroke-width="1.5" opacity="0.7"/>
  <!-- Diagonal spokes -->
  <line x1="13" y1="13" x2="18" y2="18" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="30" x2="35" y2="35" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>
  <line x1="35" y1="13" x2="30" y2="18" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>
  <line x1="13" y1="35" x2="18" y2="30" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>
  <!-- Orbit dots -->
  <circle cx="24" cy="8"  r="2" fill="#10A37F"/>
  <circle cx="40" cy="24" r="2" fill="#6366F1"/>
  <circle cx="24" cy="40" r="2" fill="#10A37F"/>
  <circle cx="8"  cy="24" r="2" fill="#6366F1"/>
</svg>
