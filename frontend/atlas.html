<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas — Research Engine</title>
<script src="shared/theme.js"></script>
<link rel="stylesheet" href="shared/shared.css">
<link rel="stylesheet" href="shared/components.css">
<style>:root { --accent:#0EA5E9; --accent-rgb:14,165,233; }</style>
</head>
<body>

<!-- TOPBAR -->
<nav class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">🗺️</span>
    <span class="topbar-brand">ATLAS</span>
    <span class="topbar-divider"></span>
    <span class="topbar-page-name">Research Engine</span>
  </div>
  <div class="topbar-right">
    <span id="connBadge" class="api-badge api-loading">⏳ Connecting…</span>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️ Light</button>
    <a href="index.html" class="btn btn-ghost btn-sm">← Home</a>
  </div>
</nav>

<!-- CHAT LAYOUT -->
<div class="agent-chat-layout">

  <!-- SESSION SIDEBAR -->
  <aside class="chat-session-sidebar">
    <div class="chat-session-header">
      <div class="chat-session-agent-icon">🗺️</div>
      <div class="chat-session-agent-info">
        <div class="chat-session-agent-name">Atlas</div>
        <div class="chat-session-agent-role">Research Engine</div>
      </div>
    </div>
    <button class="chat-new-btn" id="chatNewBtn">＋ New Chat</button>
    <div class="chat-session-list-wrap">
      <ul class="chat-session-list" id="chatSessionList"></ul>
    </div>
    <div style="padding:12px 16px;border-top:1px solid var(--border)">
      <a href="index.html" style="font-size:12px;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:6px">
        ← Back to Hub
      </a>
    </div>
  </aside>

  <!-- MAIN CHAT AREA -->
  <div class="chat-main-area">
    <div class="chat-main-header">
      <div class="chat-main-agent-dot" style="background:#0EA5E9"></div>
      <span class="chat-main-agent-name">Atlas</span>
      <span class="chat-main-agent-role">Research Engine</span>
      <span class="chat-main-hint">POST /agents/atlas/chat</span>
    </div>

    <!-- Messages -->
    <div class="chat-messages-wrap" id="chatMessages"></div>

    <!-- Empty state -->
    <div class="chat-empty-state" id="chatEmptyState">
      <div class="chat-empty-icon">🗺️</div>
      <div class="chat-empty-title">Chat with Atlas</div>
      <div class="chat-empty-desc">e.g. 'query what is quantitative easing'</div>
      <div class="chat-hint-chips">
        <span class="chat-hint-chip" onclick="window._chat&&window._chat._fillInput('query what is inflation')">query what is inflation</span>
        <span class="chat-hint-chip" onclick="window._chat&&window._chat._fillInput('query explain forex')">query explain forex</span>
        <span class="chat-hint-chip" onclick="window._chat&&window._chat._fillInput('query Bitcoin history')">query Bitcoin history</span>
        <span class="chat-hint-chip" onclick="window._chat&&window._chat._fillInput('query market cap')">query market cap</span>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-wrap">
      <div class="chat-input-row">
        <textarea class="chat-input-v5" id="chatInput" placeholder="e.g. 'query what is quantitative easing'" rows="1"></textarea>
        <button class="chat-send-v5" id="chatSend">➤</button>
      </div>
    </div>
  </div>

</div>

<div id="toast-container"></div>

<script src="shared/config.js"></script>
<script src="shared/api.js"></script>
<script src="shared/chat.js"></script>
<script src="shared/notifications.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const chat = new AgentChat('atlas', {
    messagesId: 'chatMessages',
    inputId:    'chatInput',
    sendId:     'chatSend',
    newBtnId:   'chatNewBtn',
    listId:     'chatSessionList',
    emptyId:    'chatEmptyState',
  });
  // Helper for hint chips
  chat._fillInput = function(text) {
    const inp = document.getElementById(this.inputId);
    if (inp) { inp.value = text; inp.focus(); }
  };
  window._chat = chat;
  startConnectionPolling(30_000);
});
</script>
</body>
</html>
