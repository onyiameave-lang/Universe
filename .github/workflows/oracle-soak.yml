name: Oracle Evolution Soak

on:
  schedule:
    # Every 8 hours: 00:00, 08:00, 16:00 UTC
    # Changed from every 6h to every 8h to stay within GitHub free tier
    # when combined with oracle-demo-trader.yml (every 12h, offset by 4h)
    # Budget: 3 runs/day × 12 min × 30.44 days = ~1,096 min/month
    - cron: "0 0,8,16 * * *"
  workflow_dispatch: {}   # trigger manually from the GitHub Actions tab

permissions:
  contents: write   # required so the final step can commit/push results back

jobs:
  soak:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pandas yfinance python-dotenv

      - name: Run evolution soak (one pass)
        working-directory: Oracle
        run: python tools/evolution_soak.py --generations 15 --delay-sec 3
        env:
          # Add any API keys you use (Gemini, etc.) as GitHub repo secrets,
          # then reference them here, e.g.:
          # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ORACLE_PAPER_TRADING: "true"

      - name: Commit updated logs and champions back to the repo
        run: |
          git config user.name "oracle-soak-bot"
          git config user.email "actions@users.noreply.github.com"
          git add Oracle/logs/evolution_soak.csv Oracle/memory/evolved_strategies.json Oracle/data_cache/ || true
          git diff --cached --quiet || git commit -m "Automated soak pass: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
