name: Oracle Demo Trader

on:
  schedule:
    # Every 12 hours: 04:00, 16:00 UTC — offset from oracle-soak.yml so they
    # never overlap.
    - cron: "0 4,16 * * *"
  workflow_dispatch: {}   # trigger manually from the GitHub Actions tab

permissions:
  contents: write   # required to commit the run's console log back to the repo

jobs:
  demo-trader:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pandas yfinance python-dotenv requests certifi

      - name: Run demo trader — paper mode, 1 cycle, all 41 symbols
        # NOTE: MetaTrader 5 (mt5 Python package) requires Windows + MT5 terminal.
        # On GitHub Actions (ubuntu-latest) MT5 is unavailable, so the trader
        # automatically falls back to PAPER MODE — it generates signals, applies
        # champion genomes, and logs results without placing real orders.
        # mt5_demo_trader.py does NOT write its own log/CSV/JSON file -- it only
        # prints to the console -- so we capture stdout ourselves below instead
        # of expecting a file the script never creates.
        working-directory: .
        run: |
          mkdir -p Oracle/logs
          RUN_STAMP=$(date -u +'%Y-%m-%d_%H%M')
          python -m Oracle.execution.mt5_demo_trader \
            --cycles 1 \
            --interval 0 \
            --max-trades 20 \
            2>&1 | tee "Oracle/logs/demo_run_${RUN_STAMP}.log"
          echo "RUN_STAMP=${RUN_STAMP}" >> "$GITHUB_ENV"
        env:
          ORACLE_PAPER_TRADING: "true"
          # Uncomment and add as GitHub repo secrets for real MT5 demo account
          # (still won't execute real orders on ubuntu-latest -- MT5 needs
          # Windows -- but lets Sentinel/Pulse/Atlas use a real LLM key):
          # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit run log back to the repo
        run: |
          git config user.name "oracle-demo-bot"
          git config user.email "actions@users.noreply.github.com"
          git add "Oracle/logs/demo_run_${RUN_STAMP}.log" Oracle/data_cache/ || true
          git diff --cached --quiet || git commit -m "Demo trader run: ${RUN_STAMP} UTC"
          git push

      - name: Print signal summary
        if: always()
        run: |
          echo "## Oracle Demo Trader — Signal Summary (${RUN_STAMP} UTC)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          LOG="Oracle/logs/demo_run_${RUN_STAMP}.log"
          if [ -f "$LOG" ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E "^Cycle .* done" "$LOG" | tail -5 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Rejections / errors this run" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E "no trade:|ERROR" "$LOG" | tail -20 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No log file found at $LOG" >> "$GITHUB_STEP_SUMMARY"
          fi